name: Build Desktop Apps

# 触发方式：
#   1. 手动：Actions 页 → Run workflow → 可勾选「同时构建 macOS」
#   2. 打 tag 发版：git tag v0.1.0 && git push origin v0.1.0 → 自动构建 mac + win 全平台
on:
  workflow_dispatch:
    inputs:
      build_mac:
        description: 同时构建 macOS（Apple Silicon）
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  # Windows 构建总是运行（项目当前主要诉求）
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (msvc target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (NSIS .exe only)
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # macOS 构建仅当：手动勾选「同时构建 macOS」 或 打 tag 发版时运行
  build-macos:
    if: github.event_name == 'push' || inputs.build_mac == true
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (aarch64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (.app + .dmg)
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # 发布到 GitHub Releases：仅当打 tag 发版时运行。
  # 下载前面两个构建产物，自动创建 Release 并挂上 .exe 与 .dmg（.app 是目录不上传）。
  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: weekly-report-windows
          path: artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: weekly-report-macos
          path: artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.exe
            artifacts/*.dmg
